services:
  - type: web
    name: zaytoon-vdb
    env: php
    plan: free
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan storage:link
    startCommand: php -r "file_exists('database/database.sqlite') || touch('database/database.sqlite');" && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT
    numInstances: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: sqlite
